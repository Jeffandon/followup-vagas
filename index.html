<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;padding:24px 16px}

/* ── FORM & ADMIN (tudo que some na impressão) ── */
.app-wrap{max-width:700px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px}
.card{background:#fff;border-radius:20px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:28px 32px;text-align:center}
.hdr h1{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:6px}
.hdr p{font-size:13px;opacity:.7;line-height:1.6}
.body{padding:28px 32px}
label{font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:6px}
input[type=text],input[type=email],input[type=password]{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #e0e0e0;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;transition:border .2s}
input:focus{border-color:#302b63}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-dark{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff}
.btn-green{background:linear-gradient(135deg,#1a6b3a,#27ae60);color:#fff}
.btn-ghost{background:transparent;border:2px solid #e0e0e0;color:#666;margin-top:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{background:#fdf2f0;border:1px solid #f1948a;border-radius:8px;padding:10px 14px;color:#c0392b;font-size:13px;margin-bottom:14px}
.note{font-size:11px;color:#aaa;text-align:center;margin-top:10px}
.admin-link{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;margin-top:8px}

/* ── PROGRESS ── */
.prog-bar{height:5px;background:#f0f0f0}
.prog-fill{height:100%;background:linear-gradient(90deg,#1a1a2e,#27ae60);transition:width .3s;border-radius:0 4px 4px 0}
.prog-top{display:flex;justify-content:space-between;align-items:center;padding:14px 22px}
.prog-top h2{font-family:'Playfair Display',serif;font-size:17px;color:#1a1a2e}
.prog-ct{font-size:20px;font-weight:800;color:#1a1a2e}
.prog-ct span{font-size:13px;font-weight:400;color:#aaa}

/* ── QUESTIONS ── */
.q-wrap{padding:18px 22px}
.q-block{margin-bottom:20px;padding:16px;border-radius:12px;border:2px solid #f0f0f0;background:#fafafa;transition:all .2s}
.q-block.ans{border-color:#c8e6c9;background:#f8fff8}
.q-num{font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;margin-bottom:5px}
.q-text{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:12px;line-height:1.5}
.opt{width:100%;text-align:left;padding:10px 13px;border-radius:9px;border:2px solid #e8e8e8;background:#fff;font-size:13px;color:#444;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:9px;margin-bottom:6px;transition:all .15s}
.opt:hover{border-color:#bbb;background:#f5f5f5}
.opt.sel{font-weight:700}
.radio{width:17px;height:17px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.radio-dot{width:7px;height:7px;border-radius:50%;background:#fff}

/* ── PRINT AREA ── */
#print-area{display:none}
@media print{

  }

  *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important }
}
#print-area .p-page{width:210mm;margin:0 auto;font-family:Arial,sans-serif;font-size:13px;color:#1a1a2e;padding:0}

// ── SCORE ──
function calcScore(res){
  const c={D:0,I:0,S:0,C:0};
  Object.values(res||{}).forEach(d=>{if(c[d]!==undefined)c[d]++;});
  const tot=Object.values(c).reduce((a,b)=>a+b,0);
  const pct={};['D','I','S','C'].forEach(k=>pct[k]=tot?Math.round(c[k]/tot*100):0);
  const dom=Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
  return{counts:c,pct,dom};
}

// ── RADAR SVG ──
function radarSVG(pct,size){
  size=size||180;
  const cx=size/2,cy=size/2,r=size*0.36;
  const lb=['D','I','S','C'],ag=[-90,0,90,180];
  const CO={D:'#C0392B',I:'#D35400',S:'#1E8449',C:'#1A5276'};
  function pt(k,f){f=f===undefined?1:f;const i=lb.indexOf(k),a=ag[i]*Math.PI/180,v=pct[k]/100*r*f;return[cx+v*Math.cos(a),cy+v*Math.sin(a)];}
  function ax(i,f){f=f===undefined?1:f;const a=ag[i]*Math.PI/180;return[cx+r*f*Math.cos(a),cy+r*f*Math.sin(a)];}
  let s=`<svg viewBox="0 0 ${size} ${size}" style="width:100%;max-width:${size}px">`;
  [.25,.5,.75,1].forEach(f=>{const ps=lb.map((_,i)=>ax(i,f).join(',')).join(' ');s+=`<polygon points="${ps}" fill="none" stroke="#ddd" stroke-width="0.5"/>`;});
  for(let i=0;i<4;i++){const a=ax(i);s+=`<line x1="${cx}" y1="${cy}" x2="${a[0]}" y2="${a[1]}" stroke="#ddd" stroke-width="0.4"/>`;}
  const dpts=lb.map(k=>pt(k).join(',')).join(' ');
  s+=`<polygon points="${dpts}" fill="rgba(108,99,255,.15)" stroke="#6c63ff" stroke-width="1.5"/>`;
  lb.forEach(k=>{const p=pt(k);s+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${CO[k]}"/>`;});
  lb.forEach((k,i)=>{const a=ax(i,1.22);s+=`<text x="${a[0]}" y="${+a[1]+4}" text-anchor="middle" font-size="12" font-weight="700" fill="${CO[k]}" font-family="Arial">${k}</text>`;});
  return s+'</svg>';
}

    '<style>' +
    '* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }' +
    'body { font-family: Inter, Arial, sans-serif; }' +
    '.res-card { border-radius: 14px; overflow: hidden; border: 2px solid; box-shadow: 0 4px 20px rgba(0,0,0,.08); background: #fff; }' +
    '.res-hdr { padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; border-bottom: 2px solid; }' +
    '.res-badge { border-radius: 12px; padding: 7px 18px; font-weight: 800; font-size: 15px; color: #fff; }' +
    '.res-body { padding: 20px 22px; display: flex; flex-wrap: wrap; gap: 20px; }' +
    '.radar-side { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; }' +
    '.leg { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }' +
    '.leg-i { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }' +
    '.leg-dot { width: 9px; height: 9px; border-radius: 2px; }' +
    '.info-side { flex: 1 1 240px; }' +
    '.italic-b { font-size: 13px; color: #333; line-height: 1.7; font-style: italic; border-left: 3px solid; padding-left: 11px; margin-bottom: 14px; }' +
    '.two-c { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }' +
    '.mini-b { border-radius: 9px; padding: 11px; border: 1px solid; }' +
    '.mini-t { font-weight: 700; font-size: 12px; margin-bottom: 5px; }' +
    '.mini-i { font-size: 11px; color: #333; margin-bottom: 3px; }' +
    '.anal-b { border-radius: 9px; padding: 11px; border: 1px solid; margin-bottom: 10px; }' +
    '.rec-b { border-radius: 9px; padding: 11px; border: 1px solid; }' +
    '.bars-sec { padding: 0 22px 20px; }' +

  window.print();

// ── SUPABASE ──

async function buscarResultados(){
  const res=await fetch(`${SB_URL}/rest/v1/disc_respostas?order=criado_em.desc`,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  return res.json();
}

// ── HANDLERS ──
async function submitForm(){
  if(Object.keys(ST.respostas).length<20)return;
  set({loading:true,erro:''});
  try{
    const dados={nome:ST.nome.trim(),email:ST.email.trim(),respostas:ST.respostas};
    const res=await fetch(SB_URL+'/rest/v1/disc_respostas',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
      body:JSON.stringify(dados)
    });
    const result=await res.json();
    if(!res.ok){
      set({loading:false,erro:'Erro ao salvar: '+JSON.stringify(result)});
      return;
    }
    const row=Array.isArray(result)?result[0]:result;
    set({loading:false,resultadoAtual:row,view:'resultado'});
  }catch(e){
    set({loading:false,erro:'Erro de conexão: '+e.message});
  }
}

async function loginAdmin(){
  if(ST.adminPass===ADMIN_PASS){
    set({loading:true,adminErro:'',view:'admin'});
    const res=await buscarResultados();
    set({resultados:Array.isArray(res)?res:[],loading:false});
  } else {
    set({adminErro:'Senha incorreta.'});
  }
}

async function atualizarAdmin(){
  set({loading:true});
  const res=await buscarResultados();
  set({resultados:Array.isArray(res)?res:[],loading:false});
}

function toggleCard(i){
  const b=document.getElementById('cb'+i);
  const c=document.getElementById('cv'+i);
  if(b&&c){const op=b.classList.toggle('op');c.classList.toggle('op',op);}
}

// ── RENDER ──
function renderInfo(){
  return`<div class="card">
    <div class="hdr">
      <div style="display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:4px 16px;font-size:10px;letter-spacing:3px;margin-bottom:12px;color:rgba(255,255,255,.6)">AVALIAÇÃO COMPORTAMENTAL</div>
      <h1>Perfil DISC</h1>
      <p>20 questões · Aproximadamente 5 minutos<br/>Responda com honestidade — não há respostas certas ou erradas.</p>
    </div>
    <div class="body">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px">
        ${[{k:'D',c:'#C0392B'},{k:'I',c:'#D35400'},{k:'S',c:'#1E8449'},{k:'C',c:'#1A5276'}].map(({k,c})=>`
        <div style="text-align:center;padding:12px 6px;border-radius:12px;background:${c}15;border:2px solid ${c}30">
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:${c}">${k}</div>
          <div style="font-size:10px;color:#666;margin-top:2px">${PROF[k].name}</div>
        </div>`).join('')}
      </div>
      <label>Nome completo *</label>
      <input type="text" id="inp-nome" placeholder="Digite seu nome" value="${ST.nome}" oninput="ST.nome=this.value"/>
      <label>E-mail *</label>
      <input type="email" id="inp-email" placeholder="Digite seu e-mail" value="${ST.email}" oninput="ST.email=this.value" onkeydown="if(event.key==='Enter')irParaPerguntas()"/>
      ${ST.erro?`<div class="err">${ST.erro}</div>`:''}
      <button class="btn btn-dark" onclick="irParaPerguntas()">Iniciar Avaliação →</button>
      <p class="note">Suas informações são utilizadas apenas para identificar seu resultado.</p>
    </div>
  </div>
  <button class="admin-link" onclick="set({view:'adminLogin',adminErro:'',adminPass:''})">Acesso Admin</button>`;
}

function irParaPerguntas(){
  const n=document.getElementById('inp-nome')?.value||ST.nome;
  const e=document.getElementById('inp-email')?.value||ST.email;
  ST.nome=n;ST.email=e;
  if(!n.trim()){set({erro:'Informe seu nome.'});return;}
  if(!e.trim()||!e.includes('@')){set({erro:'Informe um e-mail válido.'});return;}
  set({erro:'',step:'perguntas'});
  window.scrollTo(0,0);
}

function renderPerguntas(){
  const total=Object.keys(ST.respostas).length;
  const prog=Math.round(total/20*100);
  const allDone=total===20;
  return`<div class="card">
    <div style="background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff">
      <div class="prog-top">
        <h2>Avaliação DISC</h2>
        <div class="prog-ct">${total}<span>/20</span></div>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
    <div class="q-wrap">
      ${QS.map(q=>{
        const ans=ST.respostas[q.id];
        return`<div class="q-block ${ans?'ans':''}">
          <div class="q-num">QUESTÃO ${String(q.id).padStart(2,'0')}</div>
          <div class="q-text">${q.t}</div>
          ${q.o.map(op=>{
            const sel=ans===op.d;
            const p=PROF[op.d];
            return`<button class="opt ${sel?'sel':''}"
              style="${sel?`border-color:${p.color};background:${p.bg};color:${p.color}`:''}"
              onclick="ST.respostas={...ST.respostas,[${q.id}]:'${op.d}'};draw()">
              <div class="radio" style="${sel?`border-color:${p.color};background:${p.color}`:''}">
                ${sel?'<div class="radio-dot"></div>':''}
              </div>
              ${op.t}
            </button>`;
          }).join('')}
        </div>`;
      }).join('')}
      ${!allDone?`<div style="text-align:center;font-size:13px;color:#999;margin-bottom:14px">Responda todas as ${20-total} questão(ões) restantes para concluir.</div>`:''}
      <button class="btn ${allDone?'btn-green':'btn-dark'}" ${!allDone||ST.loading?'disabled':''} onclick="submitForm()">
        ${ST.loading?'⏳ Salvando...':(allDone?'✅ Ver Meu Resultado':'⏳ '+total+'/20 respondidas')}
      </button>
    </div>
  </div>`;
}

function renderResultado(){
  const r=ST.resultadoAtual;
  if(!r)return'';
  return`<div class="card" style="max-width:700px">
    <div class="hdr">
      <div style="font-size:32px;margin-bottom:8px">${PROF[calcScore(r.respostas).dom].icon}</div>
      <h1>Seu Perfil DISC está pronto!</h1>
      <p>Obrigado, ${r.nome}! Veja sua avaliação abaixo.</p>
    </div>
    <div class="body">
      ${resultCardHTML(r)}
      <div style="background:#f8f9fa;border-radius:10px;padding:14px;font-size:13px;color:#666;text-align:center;margin-top:14px;line-height:1.6">
        ✅ Suas respostas foram registradas. O recrutador já pode visualizar seu perfil.
      </div>
    </div>
  </div>
  <button class="admin-link" onclick="set({view:'adminLogin',adminErro:'',adminPass:''})">Acesso Admin</button>`;
}

function renderAdminLogin(){
  return`<div class="card" style="max-width:400px">
    <div class="hdr">
      <div style="font-size:32px;margin-bottom:8px">🔐</div>
      <h1>Painel Admin</h1>
      <p>Acesso restrito ao recrutador</p>
    </div>
    <div class="body">
      <label>Senha</label>
      <input type="password" placeholder="Digite a senha" value="${ST.adminPass}"
        oninput="ST.adminPass=this.value" onkeydown="if(event.key==='Enter')loginAdmin()"/>
      ${ST.adminErro?`<div class="err">${ST.adminErro}</div>`:''}
      <button class="btn btn-dark" onclick="loginAdmin()">Acessar →</button>
      <button class="btn btn-ghost" onclick="set({view:'form',step:'info'})">← Voltar</button>
    </div>
  </div>`;
}

function renderAdmin(){
  const rs=ST.resultados;
  const dom={D:0,I:0,S:0,C:0};
  rs.forEach(r=>{const s=calcScore(r.respostas);dom[s.dom]++;});
  const kpis=[
    {l:'Total',v:rs.length,s:'candidatas',c:'#6c63ff'},
    {l:'Dominância D',v:dom.D,s:'candidatas',c:'#C0392B'},
    {l:'Influência I',v:dom.I,s:'candidatas',c:'#D35400'},
    {l:'Estabilidade S',v:dom.S,s:'candidatas',c:'#1E8449'},
    {l:'Conformidade C',v:dom.C,s:'candidatas',c:'#1A5276'},
  ];
  return`<div class="adm-wrap">
    <div class="adm-top">
      <div>
        <div class="adm-title">📊 Painel DISC</div>
        <div class="adm-sub">${rs.length} resposta(s) recebida(s)</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="adm-btn" onclick="atualizarAdmin()">🔄 Atualizar</button>
        <button class="adm-btn" onclick="set({view:'form',step:'info'})">← Sair</button>
      </div>
    </div>
    <div class="kpi-grid">
      ${kpis.map(k=>`<div class="kpi" style="--kc:${k.c}">
        <div class="kpi-lbl">${k.l}</div>
        <div class="kpi-val">${k.v}</div>
        <div class="kpi-sub">${k.s}</div>
      </div>`).join('')}
    </div>
    ${ST.loading?`<div class="loading-adm">⏳ Carregando...</div>`:
      rs.length===0?`<div class="empty-adm"><div style="font-size:48px;margin-bottom:12px">📭</div><div>Nenhuma resposta ainda.</div></div>`:
      (_RS=rs,rs).map((r,i)=>{
        const {dom,pct}=calcScore(r.respostas);
        const p=PROF[dom];
        const dt=r.criado_em?new Date(r.criado_em).toLocaleString('pt-BR'):'';
        return`<div class="cand-row">
          <div class="cand-top" onclick="toggleCard(${i})">
            <div class="cand-info">
              <div class="cand-av" style="background:${p.color}">${dom}</div>
              <div>
                <div class="cand-nm">${r.nome}</div>
                <div class="cand-em">${r.email}</div>
              </div>
            </div>
            <div class="cand-right">
              <span class="pill" style="background:${p.bg};color:${p.color}">${p.icon} ${p.name}</span>
              <span class="cand-dt">${dt}</span>
              <button class="btn-print" onclick="event.stopPropagation();printReport(${i})">
                🖨️ Imprimir Relatório
              </button>
              <span class="chev" id="cv${i}">⌄</span>
            </div>
          </div>
          <div class="cand-body" id="cb${i}">
            <div id="card-content-${i}" style="padding:8px 0 4px">${resultCardHTML(r)}</div>
          </div>
        </div>`;
      }).join('')
    }
  </div>`;
}

function draw(){
  const app=document.getElementById('app');
  if(ST.view==='admin'){
    document.body.style.padding='24px 16px';
    app.innerHTML=`<div style="max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:0">${renderAdmin()}</div>`;
    return;
  }
  document.body.style.padding='24px 16px';
  app.innerHTML=`<div class="app-wrap">${
    ST.view==='adminLogin'?renderAdminLogin():
    ST.view==='resultado'?renderResultado():
    ST.step==='perguntas'?renderPerguntas():
    renderInfo()
  }</div>`;
}

var _RS=[];
draw();
</script>
